<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SCOPES 2027</title>
    <script>
      // Redirect to index.html preserving the path as a query param
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/?redirect=' + encodeURIComponent(path));
    </script>
  </head>

</html>
